            - link "Vision-Aided Relative State Estimation for Approach and Landing on a Moving Platform with Inertial Measurements 本文研究了无人机（UAV）在动态移动平台上着陆时的相对位姿与速度估计问题。针对平台进行任意三维运动的情况，作者提出一种基于惯性测量单元（IMU）和单目视觉信息的级联观测器架构。系统利用安装在无人机和平台上的IMUs获取角速度与线加速度，并通过机载相机提取指向平台中心的视线方向（bearing vector）以及平台表面法向量。首先设计一个定义在SO(3)上的互补滤波器来估计相对姿态，随后将该估计结果用于构建一个线性Riccati观测器，以恢复相对位置和速度。理论分析表明，在持续激励条件下，整个级联系统具有几乎全局渐近稳定性和局部指数收敛性。进一步地，当平台仅绕其法向轴旋转时，作者扩展了设计方法，利用平台的线加速度信息恢复不可观测的偏航角，并给出了保证局部指数收敛的充分条件。大量仿真验证了所提方法的有效性与鲁棒性。 无人机 机器人 状态估计 传感器融合 非线性观测器设计 0 0 2025.12.22 发表" [ref=e811] [cursor=pointer]:
